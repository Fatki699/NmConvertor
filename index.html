<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Torque Unit Converter</title>
    <style>
        :root{
            --bg: #f5f7fa;
            --card: #ffffff;
            --muted: #4a5568;
            --accent: #3182ce;
            --accent-strong: #2b6cb0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        [data-theme='dark']{
            --bg:#0b1220; --card:#0f1724; --muted:#cbd5e1; --accent:#63b3ed; --accent-strong:#90cdf4; --shadow: none;
            color: var(--muted);
        }
        html,body{height:100%;}
        body{
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color:var(--bg);
            margin:0;padding:20px;display:flex;align-items:center;justify-content:center;min-height:100vh;
        }
        .converter-box{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:24px;width:100%;max-width:540px;box-sizing:border-box}
        h1{font-size:20px;margin:0 0 14px;text-align:center;color:var(--accent-strong)}
        .input-grid{display:grid;grid-template-columns:1fr 160px;gap:12px;align-items:center;margin-bottom:12px}
        label{display:block;margin-bottom:6px;font-weight:600;color:var(--muted);font-size:14px}
        input[type=number], select{width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:16px;box-sizing:border-box}
        input[type=number]:focus, select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(49,130,206,0.08)}
        .controls{display:flex;gap:8px;margin-top:12px}
        button{background:var(--accent);color:white;border:none;padding:10px 12px;border-radius:8px;cursor:pointer;font-weight:600}
        button.secondary{background:#edf2f7;color:#1a202c}
        .result-card{background:#ebf8ff;border-left:4px solid var(--accent);padding:12px;border-radius:0 8px 8px 0;margin-top:14px}
        .result-item{display:flex;justify-content:space-between;align-items:center;margin:8px 0;font-size:16px;color:#2d3748}
        .result-value{font-weight:700;color:var(--accent-strong);font-size:16px}
        .meta{display:flex;gap:8px;align-items:center;margin-top:8px}
        .theme-toggle{margin-left:auto;background:transparent;color:var(--accent);border:1px solid transparent;padding:6px 8px;border-radius:8px}
        .sr-only{position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden}
        footer{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
        @media(max-width:520px){
            .input-grid{grid-template-columns:1fr 120px}
        }
    </style>
</head>
<body>
<div class="converter-box" id="app" data-theme="light">
    <h1>Torque Unit Converter</h1>

    <div class="input-grid">
        <div>
            <label for="valueInput">Value</label>
            <input id="valueInput" type="number" inputmode="decimal" step="any" placeholder="Enter a value" aria-describedby="inputHelp">
            <div id="inputHelp" class="sr-only">Enter a numeric value in the selected unit. Results update automatically.</div>
        </div>

        <div>
            <label for="unitSelect">Unit</label>
            <select id="unitSelect" aria-label="Input unit">
                <option value="Nm">N·m</option>
                <option value="lbfIn">lbf·in</option>
                <option value="lbfFt">lbf·ft</option>
            </select>
        </div>
    </div>

    <div class="input-grid" style="grid-template-columns:1fr 1fr;">
        <div>
            <label for="precision">Decimal places</label>
            <select id="precision" aria-label="Decimal places">
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="6">6</option>
            </select>
        </div>

        <div style="display:flex;align-items:flex-end;gap:8px;">
            <button id="copyBtn" type="button">Copy results</button>
            <button id="clearBtn" type="button" class="secondary">Clear</button>
            <button id="themeBtn" type="button" class="secondary theme-toggle" aria-pressed="false">Dark</button>
        </div>
    </div>

    <div class="result-card" aria-live="polite" aria-atomic="true">
        <div class="result-item">
            <div>N·m</div>
            <div class="result-value" id="nmResult">0</div>
        </div>
        <div class="result-item">
            <div>lbf·in</div>
            <div class="result-value" id="lbfInResult">0</div>
        </div>
        <div class="result-item">
            <div>lbf·ft</div>
            <div class="result-value" id="lbfFtResult">0</div>
        </div>
        <div class="result-item">
            <div>Notes</div>
            <div style="color:var(--muted);font-size:13px">1 N·m ≈ 0.737562149277 lbf·ft = 8.850745791324 lbf·in</div>
        </div>
    </div>

    <footer>Converted and formatted using your browser locale.</footer>
</div>

<script>
(function(){
    const valueInput = document.getElementById('valueInput');
    const unitSelect = document.getElementById('unitSelect');
    const nmResult = document.getElementById('nmResult');
    const lbfInResult = document.getElementById('lbfInResult');
    const lbfFtResult = document.getElementById('lbfFtResult');
    const precisionSelect = document.getElementById('precision');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const themeBtn = document.getElementById('themeBtn');
    const app = document.getElementById('app');

    // Conversion constants
    const NM_TO_LBFT = 0.737562149277; // 1 N·m = 0.737562149277 lbf·ft
    const NM_TO_LBIN = NM_TO_LBFT * 12; // 1 N·m = 8.850745791324 lbf·in

    // Convert any input to Nm (base unit)
    function toNm(value, unit){
        if (!isFinite(value)) return NaN;
        switch(unit){
            case 'Nm': return value;
            case 'lbfIn': return value / NM_TO_LBIN; // lbf·in -> N·m
            case 'lbfFt': return value / NM_TO_LBFT; // lbf·ft -> N·m
            default: return NaN;
        }
    }

    // Format number according to locale and precision
    function formatNumber(value, digits){
        if (!isFinite(value)) return '—';
        const opts = {minimumFractionDigits:0, maximumFractionDigits: digits};
        const nf = new Intl.NumberFormat(navigator.language || 'en-US', opts);
        return nf.format(roundTo(value, digits));
    }

    function roundTo(value, digits){
        const factor = Math.pow(10, digits);
        return Math.round(value * factor) / factor;
    }

    function updateResults(){
        const raw = valueInput.value;
        const val = parseFloat(raw);
        const unit = unitSelect.value;
        const digits = parseInt(precisionSelect.value, 10) || 3;

        if (raw === '' || isNaN(val)){
            nmResult.textContent = '0';
            lbfInResult.textContent = '0';
            lbfFtResult.textContent = '0';
            return;
        }

        const nm = toNm(val, unit);
        const lbfIn = nm * NM_TO_LBIN;
        const lbfFt = nm * NM_TO_LBFT;

        nmResult.textContent = formatNumber(nm, digits);
        lbfInResult.textContent = formatNumber(lbfIn, digits);
        lbfFtResult.textContent = formatNumber(lbfFt, digits);
    }

    async function copyResults(){
        const inputVal = valueInput.value || '0';
        const inputUnitLabel = unitSelect.options[unitSelect.selectedIndex].text;
        const text = `Input: ${inputVal} ${inputUnitLabel}\nN·m: ${nmResult.textContent}\nlbf·in: ${lbfInResult.textContent}\nlbf·ft: ${lbfFtResult.textContent}`;
        try{
            await navigator.clipboard.writeText(text);
            copyBtn.textContent = 'Copied!';
            setTimeout(()=> copyBtn.textContent = 'Copy results', 1200);
        }catch(e){
            alert('Copy failed. Please select results and copy manually.');
        }
    }

    function clearInput(){
        valueInput.value = '';
        updateResults();
        valueInput.focus();
    }

    function toggleTheme(){
        const current = app.getAttribute('data-theme') || 'light';
        const next = current === 'light' ? 'dark' : 'light';
        app.setAttribute('data-theme', next);
        themeBtn.setAttribute('aria-pressed', next === 'dark');
        themeBtn.textContent = next === 'dark' ? 'Light' : 'Dark';
    }

    // Event listeners
    valueInput.addEventListener('input', updateResults);
    unitSelect.addEventListener('change', updateResults);
    precisionSelect.addEventListener('change', updateResults);
    copyBtn.addEventListener('click', copyResults);
    clearBtn.addEventListener('click', clearInput);
    themeBtn.addEventListener('click', toggleTheme);

    // Initialize
    updateResults();

})();
</script>
</body>
</html>
